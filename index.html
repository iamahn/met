<div class="control-row">

        <div class="button-outer">
            <div class="button-inner">
                <span>CLEAR</span>
            </div>
        </div>
    </button>

    <button id="btn-play" class="control-btn play-btn">PLAY/STOP</button>
    
    <!-- 3. 템포 컨트롤러 영역 -->
