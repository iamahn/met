<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>new metronome</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* 1. 흰 배경 바탕 및 중앙 정렬 */
        body {
            background-color: #ffffff; /* 전체 배경은 흰색 */
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            font-family: 'Arial', sans-serif;
        }

        /* 2. body_2.png의 본체 (가운데 정렬되는 회색 판) */
        .app-container {
            background-color: #cccccc; /* 이미지의 기본 회색 배경 */
            width: 100%;
            max-width: 1000px; /* 고정된 박스 형태로 화면 중앙에 위치 */
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 40px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); /* 입체감을 위한 살짝의 그림자 */
        }

        /* ----------------------------------
           ROW 1: 상단 직사각형 박스 3개 
        ---------------------------------- */
        .top-row {
            display: flex;
            gap: 40px;
        }

        .rect-box {
            background-color: #999999;
            height: 180px;
        }

        .rect-box.small { flex: 1; }
        .rect-box.medium { flex: 2.3; }
        .rect-box.large { flex: 3.2; }

        /* ----------------------------------
           ROW 2: 중간 원형 요소 5개
        ---------------------------------- */
        .middle-row {
            display: flex;
            justify-content: space-between;
            padding: 0 10px;
        }

        .circle-box {
            width: 90px;
            height: 90px;
            background-color: #999999;
            border-radius: 50%;
        }

        /* ----------------------------------
           ROW 3: 하단 라벨 + 그리드 시스템
        ---------------------------------- */
        .bottom-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .grid-line {
            display: flex;
            align-items: center;
        }

        .grid-label {
            width: 50px;
            font-size: 16px;
            font-weight: bold;
            color: #000000;
        }

        .grid-wrapper {
            flex: 1;
            display: flex;
            gap: 10px; /* 4개 그룹 사이의 간격 */
        }

        /* 하나의 큰 그룹 패널 */
        .grid-group {
            flex: 1;
            display: flex;
            gap: 2px; /* 상자들 사이의 얇은 틈새 격자 */
        }

        /* 개별 회색 격자 상자 */
        .grid-cell {
            flex: 1;
            height: 55px;
            background-color: #b3b3b3;
            border: 1px solid #bcbcbc; /* 미세한 테두리 표현 */
        }
        
        
    .rect-box.small {
    flex: 3.2;
    
    /* 텍스트를 상자의 정중앙으로 배치하기 위한 속성 */
    display: flex;
    align-items: center;      /* 세로 중앙 정렬 */
    justify-content: center;   /* 가로 중앙 정렬 */
    
    /* 글자 스타일 (원하는 대로 조절 가능) */
    font-size: 120px;           /* 글자 크기 */
    font-weight: bold;         /* 글자 두껍게 */
    color: #ffffff;            /* 글자 색상 (흰색) */
}    
        


        
    .rect-box.medium {
    flex: 3.2;
    
    /* 텍스트를 상자의 정중앙으로 배치하기 위한 속성 */

/* 기존 circle-container의 gap(간격)을 조금 줄여 뭉쳐 보이게 조절합니다 */

    cursor: pointer;
